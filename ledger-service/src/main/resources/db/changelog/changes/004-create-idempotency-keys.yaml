databaseChangeLog:
  - changeSet:
      id: 004-create-idempotency-keys
      author: ledger-dev
      changes:
        - createTable:
            tableName: idempotency_keys
            columns:
              - column:
                  name: key
                  type: VARCHAR(255)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: response_payload
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: http_status_code
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            tableName: idempotency_keys
            indexName: idx_idempotency_keys_expires_at
            columns:
              - column:
                  name: expires_at
      rollback:
        - dropTable:
            tableName: idempotency_keys
