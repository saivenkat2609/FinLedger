spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**

        - id: ledger-service
          uri: lb://ledger-service
          predicates:
            - Path=/api/**

        - id: reporting-service
          uri: lb://reporting-service
          predicates:
            - Path=/reports/**

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8

server:
  port: 8080

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.ledger.gateway: DEBUG
    org.springframework.cloud.gateway: INFO

app:
  rate-limit:
    authenticated: 1000
    anonymous: 100
